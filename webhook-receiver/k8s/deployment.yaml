apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      serviceAccountName: webhook-receiver
      containers:
        - name: webhook-receiver
          image: webhook-receiver:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /buffer
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
