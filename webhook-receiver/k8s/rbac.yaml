apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-receiver
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: webhook-receiver-reader
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: webhook-receiver-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: webhook-receiver-reader
subjects:
  - kind: ServiceAccount
    name: webhook-receiver
    namespace: demo
