# ServiceAccount with pod/exec permission so the event-generator can simulate
# kubectl exec — the exact permission that triggers the k8saudit detection path.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-generator
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-generator
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-generator
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: event-generator
subjects:
  - kind: ServiceAccount
    name: event-generator
    namespace: prod
---
# Job runs syscall.ExecInsideContainer once (loop: false) and exits.
# This fires the "Terminal shell in container" Falco rule.
# NOTE: The alert references the event-generator pod itself (not webapp) —
# this is expected. The agent correlates on namespace, not just pod name.
apiVersion: batch/v1
kind: Job
metadata:
  name: event-generator
  namespace: prod
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: event-generator
      containers:
        - name: event-generator
          image: falcosecurity/event-generator:0.13.0
          args: ["run", "syscall.RunShellUntrusted", "--loop=false"]
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
