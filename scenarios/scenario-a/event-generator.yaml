# Scenario A: a real `kubectl exec` into the prod webapp pod.
# The exec is an API call the audit log captures (k8saudit: Attach/Exec Pod), and the
# command it runs inside the container reads /etc/shadow, which the syscall instance
# catches (Read sensitive file untrusted). One action, both detection sources, same pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-generator
  namespace: prod
---
# Exactly the rights the exec needs: list pods to resolve the target, create pods/exec to run it.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-generator
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-generator
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: event-generator
subjects:
  - kind: ServiceAccount
    name: event-generator
    namespace: prod
---
apiVersion: batch/v1
kind: Job
metadata:
  name: event-generator
  namespace: prod
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: event-generator
      containers:
        - name: exec-driver
          # kubectl + shell; uses the in-cluster ServiceAccount token automatically.
          image: alpine/k8s:1.34.1
          command: ["/bin/sh", "-c"]
          # No -it: a non-TTY exec still produces the audit event and the cat read fires the
          # syscall rule (the reader is `cat`, not a shell, so it isn't excluded).
          args:
            - |
              POD=$(kubectl get pods -n prod -l app=webapp -o jsonpath='{.items[0].metadata.name}')
              kubectl exec -n prod "$POD" -- sh -c 'cat /etc/shadow'
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
