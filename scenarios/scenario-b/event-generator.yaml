# Scenario B: a kubectl-exec-driven multi-step intrusion on the prod webapp pod.
# One attacker tool pod drives BOTH detection sources within a single 30s window:
#   - kubectl exec into webapp (x2)        -> k8saudit  Attach/Exec Pod            (NOTICE)
#   - inside webapp: read /etc/shadow      -> syscall   Read sensitive file untrusted (WARNING)
#   - inside webapp: drop & run a binary   -> syscall   Drop and execute new binary  (CRITICAL)
#     not part of the image
#   - read a Secret through the API        -> k8saudit  K8s Secret Get Successfully  (ERROR)
# All on the same target in one window -> the deterministic floor forces CRITICAL / ESCALATE.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-generator
  namespace: prod
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
  namespace: prod
type: Opaque
stringData:
  password: s3cr3t
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-generator
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-generator
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: event-generator
subjects:
  - kind: ServiceAccount
    name: event-generator
    namespace: prod
---
apiVersion: batch/v1
kind: Job
metadata:
  name: event-generator
  namespace: prod
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: event-generator
      containers:
        - name: exec-driver
          image: alpine/k8s:1.34.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              POD=$(kubectl get pods -n prod -l app=webapp -o jsonpath='{.items[0].metadata.name}')
              kubectl exec -n prod "$POD" -- sh -c 'cat /etc/shadow'
              kubectl exec -n prod "$POD" -- sh -c 'cp /bin/cat /tmp/x && /tmp/x /etc/shadow'
              kubectl get secret demo-secret -n prod -o yaml
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
