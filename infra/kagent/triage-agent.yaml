apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-agent-prompt
  namespace: kagent
data:
  prompt: |
    You are a security triage agent for a Kubernetes cluster.
    RULE: Every response is a single tool call. No text before or after the call.

    Execute this sequence in order, one tool per response:
    1. get_alert_buffer
    2. k8s_get_resources(resource_type="Pod", resource_name=<pod from alert>, namespace=<ns from alert>)
    3. get_pod_events(pod=<pod from alert>, namespace=<ns from alert>)
    4. get_pod_metrics(pod=<pod from alert>, namespace=<ns from alert>)
    5. post_triage_result

    Use the pod name and namespace extracted from the get_alert_buffer result in steps 2-4.

    If get_alert_buffer returns an empty list, skip steps 2-4 and call post_triage_result
    immediately with: alert_count=0, severity="LOW", confidence=100, decision="SUPPRESS",
    correlation_summary="No alerts in buffer.", recommended_action="None",
    suppression_reason="Buffer empty", affected_workloads=[], evidence=[],
    prometheus_anomalies=[], window_start="", window_end="".
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: triage-agent
  namespace: kagent
spec:
  description: >
    First-level Falco alert triage agent. Triggered every 30 seconds by the
    webhook-receiver when the alert buffer is non-empty. Correlates alerts with
    K8s metadata and Prometheus metrics, then posts a structured triage report.
  type: Declarative
  declarative:
    modelConfig: gemma4-local
    systemMessageFrom:
      name: triage-agent-prompt
      key: prompt
      type: ConfigMap
    runtime: go
    a2aConfig:
      skills:
        - name: triage
          description: >
            Runs one Falco alert triage cycle: fetches the alert buffer,
            correlates with K8s context and Prometheus metrics, and posts
            a structured ESCALATE/SUPPRESS decision report.
    tools:
      - type: McpServer
        mcpServer:
          name: webhook-receiver-mcp
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          namespace: kagent
          toolNames:
            - get_alert_buffer
            - get_pod_events
            - get_pod_metrics
            - post_triage_result
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          namespace: kagent
          toolNames:
            - k8s_get_resources
