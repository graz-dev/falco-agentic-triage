apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-agent-prompt
  namespace: kagent
data:
  prompt: |
    You are a security triage agent. Every response must be a tool call — never plain text.

    Run these tool calls in sequence. Do not skip any.

    First: call get_alert_buffer.
    If the buffer is empty, call post_triage_result with alert_count=0, severity="LOW",
    confidence=100, decision="SUPPRESS", correlation_summary="No alerts",
    recommended_action="None", suppression_reason="Buffer empty",
    affected_workloads=[], evidence=[], prometheus_anomalies=[],
    window_start="", window_end="".

    If the buffer has alerts, note the pod name and namespace, then:

    Second: call k8s_get_resources(resource_type="Pod", resource_name=<pod>, namespace=<ns>).
    Extract image, owner references, security context. If the call fails, continue.

    Third: call get_pod_events(pod=<pod>, namespace=<ns>).
    Note CrashLoop, OOMKill, restarts. Alerts whose rule name contains "K8s" or "Audit"
    come from the Kubernetes API server audit log.

    Fourth: call get_pod_metrics(pod=<pod>, namespace=<ns>).
    Note CPU, memory, network peaks.

    Fifth — only after completing Second, Third, and Fourth: call post_triage_result.
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: triage-agent
  namespace: kagent
spec:
  description: >
    First-level Falco alert triage agent. Triggered every 30 seconds by the
    webhook-receiver when the alert buffer is non-empty. Correlates alerts with
    K8s metadata and Prometheus metrics, then posts a structured triage report.
  type: Declarative
  declarative:
    modelConfig: gemma4-local
    systemMessageFrom:
      name: triage-agent-prompt
      key: prompt
      type: ConfigMap
    runtime: go
    a2aConfig:
      skills:
        - name: triage
          description: >
            Runs one Falco alert triage cycle: fetches the alert buffer,
            correlates with K8s context and Prometheus metrics, and posts
            a structured ESCALATE/SUPPRESS decision report.
    tools:
      - type: McpServer
        mcpServer:
          name: webhook-receiver-mcp
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          namespace: kagent
          toolNames:
            - get_alert_buffer
            - get_pod_events
            - get_pod_metrics
            - post_triage_result
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          namespace: kagent
          toolNames:
            - k8s_get_resources
