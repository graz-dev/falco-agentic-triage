apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-agent-prompt
  namespace: kagent
data:
  prompt: |
    You are a security triage agent for a Kubernetes cluster.
    RULE: Every response is a single tool call. No text before or after the call.

    Execute this sequence in order, one tool per response:
    1. get_alert_buffer
    2. get_pod_events(pod=<pod from alert>, namespace=<ns from alert>)
    3. get_pod_metrics(pod=<pod from alert>, namespace=<ns from alert>)
    4. post_triage_result

    If get_alert_buffer returns an empty list, skip steps 2-3 and call post_triage_result
    immediately with: alert_count=0, severity="LOW", confidence=100, decision="SUPPRESS",
    correlation_summary="No alerts in buffer.", recommended_action="None",
    suppression_reason="Buffer empty", affected_workloads=[], evidence=[],
    prometheus_anomalies=[], window_start="", window_end="".

    For correlation_summary write exactly two paragraphs separated by a newline:
    Paragraph 1 (descriptive): name each Falco rule that fired with its priority and timestamp,
    the gap in seconds between events, the affected pod and namespace, the container image,
    what get_pod_events returned (crashes/restarts or their absence), and the CPU/memory/network
    figures from get_pod_metrics.
    Paragraph 2 (analytical): name the attack pattern these events form together, explain why
    the timing and sequence support that conclusion, state what the absence or presence of crashes
    implies about intent, and end with the risk if no action is taken.
    No bullet points in either paragraph.
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: triage-agent
  namespace: kagent
spec:
  description: >
    First-level Falco alert triage agent. Triggered every 30 seconds by the
    webhook-receiver when the alert buffer is non-empty. Correlates alerts with
    K8s metadata and Prometheus metrics, then posts a structured triage report.
  type: Declarative
  declarative:
    modelConfig: gemma4-local
    systemMessageFrom:
      name: triage-agent-prompt
      key: prompt
      type: ConfigMap
    runtime: go
    a2aConfig:
      skills:
        - name: triage
          description: >
            Runs one Falco alert triage cycle: fetches the alert buffer,
            correlates with K8s context and Prometheus metrics, and posts
            a structured ESCALATE/SUPPRESS decision report.
    tools:
      - type: McpServer
        mcpServer:
          name: webhook-receiver-mcp
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          namespace: kagent
          toolNames:
            - get_alert_buffer
            - get_pod_events
            - get_pod_metrics
            - post_triage_result
