# IMPORTANT: Before applying this file, copy the exact model identifier string
# from LM Studio's Developer → Local Server tab (the "Model" dropdown) and paste
# it into spec.ai.groups[0].providers[0].openai.model below.
# Example: qwen2.5-7b-instruct-mlx
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: lmstudio
  namespace: agentgateway-system
spec:
  ai:
    groups:
      - providers:
          - name: lmstudio
            # host.docker.internal resolves to the Mac host from inside Kind on Docker Desktop.
            # Linux users: add --add-host=host.docker.internal:host-gateway to Docker daemon.
            host: host.docker.internal
            port: 1234
            # agentgateway v1alpha1 schema uses `path` (full OpenAI-compatible path), NOT `pathPrefix`.
            path: /v1/chat/completions
            openai:
              # REPLACE with the exact model id from LM Studio's server tab
              # (MLX short id, e.g. qwen2.5-7b-instruct-mlx).
              model: "qwen2.5-7b-instruct-mlx"
            policies:
              auth:
                # LM Studio does not validate API keys — pass through the client-provided key
                passthrough: {}
---
# HTTPRoute connects the Gateway listener to the lmstudio AgentgatewayBackend.
# All /v1/* requests (chat/completions, etc.) are routed to LM Studio.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-system-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: lmstudio
          kind: AgentgatewayBackend
          group: agentgateway.dev
          port: 80
