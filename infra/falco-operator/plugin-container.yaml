# The k8saudit plugin requires the container plugin (>= 0.4.0) to resolve
# container metadata from audit log events. Both plugins must be loaded together.
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Plugin
metadata:
  name: container
  namespace: falco
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/plugin/container
      tag: latest
  config:
    name: container
