# Enriches syscall events with container metadata (image, name, labels) on the syscall DaemonSet.
# (Not used by k8saudit: the container plugin only binds to the syscall source.)
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Plugin
metadata:
  name: container
  namespace: falco
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/plugin/container
      tag: "0.7.1"
  config:
    name: container
