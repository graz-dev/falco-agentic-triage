apiVersion: instance.falcosecurity.dev/v1alpha1
kind: Falco
metadata:
  name: falco
  namespace: falco
spec:
  version: "0.44.1"
  type: DaemonSet
  podTemplateSpec:
    spec:
      containers:
        - name: falco
          volumeMounts:
            # Mount the HTTP output drop-in config into Falco's config.d directory.
            # Falco loads all *.yaml files from config.d at startup (config_files setting).
            # This enables json_output and http_output forwarding to Falcosidekick.
            - name: falco-http-output
              mountPath: /etc/falco/config.d/http-output.yaml
              subPath: http-output.yaml
      volumes:
        - name: falco-http-output
          configMap:
            name: falco-http-output-config
