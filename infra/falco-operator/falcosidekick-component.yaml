---
# Falcosidekick config passed as a file via podTemplateSpec (the Component CRD has no native config field).
apiVersion: v1
kind: ConfigMap
metadata:
  name: falcosidekick-config
  namespace: falco
data:
  config.yaml: |
    webhook:
      address: "http://webhook-receiver.demo.svc.cluster.local:8000/ingest"
      checkcert: false
      # notice (not warning) so k8s_audit Attach/Exec (NOTICE) and Terminal shell in container (NOTICE) pass through.
      minimumpriority: "notice"
---
apiVersion: instance.falcosecurity.dev/v1alpha1
kind: Component
metadata:
  name: falcosidekick
  namespace: falco
spec:
  component:
    type: falcosidekick
    # Pin the bundled Falcosidekick version (operator v0.4.0 default) for reproducibility.
    version: "2.32.0"
  podTemplateSpec:
    spec:
      containers:
        - name: falcosidekick
          args:
            - "--config-file=/etc/falcosidekick/config.yaml"
          volumeMounts:
            - name: falcosidekick-cfg
              mountPath: /etc/falcosidekick
      volumes:
        - name: falcosidekick-cfg
          configMap:
            name: falcosidekick-config
