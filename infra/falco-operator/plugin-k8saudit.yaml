# Plugin CRD: loads the k8saudit plugin into Falco via OCI artifact.
# The plugin opens an HTTP webhook listener on port 9765 inside the Falco pod.
# The kube-apiserver (configured via audit-webhook-config.yaml) delivers audit
# events to this port. The Service below exposes it as NodePort 30765 so that
# the kube-apiserver (running in host-network mode in the Kind node) can reach
# it via localhost:30765 once Falco is deployed.
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Plugin
metadata:
  name: k8saudit
  namespace: falco
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/plugin/k8saudit
      tag: latest
  config:
    name: k8saudit
    openParams: "http://0.0.0.0:9765/k8s-audit"
---
# NodePort service so the kube-apiserver (hostNetwork on the Kind node) can
# deliver audit events to the Falco k8saudit plugin via localhost:30765.
apiVersion: v1
kind: Service
metadata:
  name: falco-k8saudit
  namespace: falco
spec:
  selector:
    app.kubernetes.io/name: falco
  type: NodePort
  ports:
    - name: k8saudit
      port: 9765
      targetPort: 9765
      nodePort: 30765
      protocol: TCP
