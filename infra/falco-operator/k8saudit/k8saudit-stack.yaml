# k8s audit detection: a dedicated Deployment-mode Falco in its own namespace, so its plugins
# aren't loaded into the syscall DaemonSet. The k8saudit ruleset requires the json plugin.
# Apiserver audit wiring (policy/webhook/flags) lives in the kind cluster config — see ./README.md.
# Tags verified 2026-06-26.
---
apiVersion: v1
kind: Namespace
metadata:
  name: falco-k8saudit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-http-output-config
  namespace: falco-k8saudit
data:
  http-output.yaml: |
    json_output: true
    http_output:
      enabled: true
      url: "http://falcosidekick.falco.svc.cluster.local:2801"
      insecure: true
---
apiVersion: instance.falcosecurity.dev/v1alpha1
kind: Falco
metadata:
  name: falco-k8saudit
  namespace: falco-k8saudit
spec:
  version: "0.44.1"
  type: Deployment
  # Forward audit alerts to the same Falcosidekick as the syscall DaemonSet, so the agent sees both sources.
  podTemplateSpec:
    spec:
      containers:
        - name: falco
          volumeMounts:
            - name: falco-http-output
              mountPath: /etc/falco/config.d/http-output.yaml
              subPath: http-output.yaml
      volumes:
        - name: falco-http-output
          configMap:
            name: falco-http-output-config
---
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Plugin
metadata:
  name: json
  namespace: falco-k8saudit
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/plugin/json
      tag: "0.7.4"
---
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Plugin
metadata:
  name: k8saudit
  namespace: falco-k8saudit
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/plugin/k8saudit
      tag: "0.18.0"
  config:
    name: k8saudit
    openParams: "http://0.0.0.0:9765/k8s-audit"
---
apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Rulesfile
metadata:
  name: k8saudit-rules
  namespace: falco-k8saudit
spec:
  ociArtifact:
    registry:
      name: ghcr.io
    image:
      repository: falcosecurity/plugins/ruleset/k8saudit
      tag: "0.18.0"
  priority: 50
---
# NodePort so the hostNetwork kube-apiserver reaches the audit endpoint at localhost:30765
# (matches infra/audit-webhook-config.yaml). On a fresh single-node kind cluster kube-proxy
# programs the NodePort on the node; validate, and fall back to the Service ClusterIP if needed.
apiVersion: v1
kind: Service
metadata:
  name: falco-k8saudit-webhook
  namespace: falco-k8saudit
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: falco-k8saudit
    app.kubernetes.io/name: falco-k8saudit
  ports:
    - port: 9765
      targetPort: 9765
      nodePort: 30765
