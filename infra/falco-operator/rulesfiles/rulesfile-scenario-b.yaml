apiVersion: artifact.falcosecurity.dev/v1alpha1
kind: Rulesfile
metadata:
  name: scenario-b-rules
  namespace: falco
spec:
  # priority 99 (max allowed) ensures custom rules load AFTER default rules (priority 50)
  priority: 99
  inlineRules:
    - rule: Read Sensitive File in Container
      desc: >
        A process inside a container read a file commonly used for credential storage
        (/etc/shadow, /etc/passwd, SSH keys). Common reconnaissance step in container
        breakout and credential theft scenarios.
      condition: >
        open_read and container
        and (fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers, /etc/master.passwd)
             or fd.name startswith /root/.ssh/
             or fd.name startswith /home/)
        and not proc.name in (sshd, su, sudo, passwd, login, cron)
      output: >
        Sensitive file read inside container
        (user=%user.name command=%proc.cmdline pid=%proc.pid
         file=%fd.name container=%container.id image=%container.image.repository
         k8s_pod=%k8s.pod.name k8s_ns=%k8s.ns.name)
      priority: WARNING
      tags: [container, filesystem, sensitive_files, mitre_credential_access]

    - rule: Shell Spawned in Container (Demo)
      desc: >
        An interactive shell was spawned inside a container. Interactive shells in
        prod workloads are unexpected and indicate active hands-on-keyboard intrusion.
        This rule is distinct from the default Terminal shell in container rule to
        ensure it is tagged for the demo correlation pipeline.
      condition: >
        spawned_process and container
        and proc.name in (sh, bash, csh, zsh, ash, dash, ksh, tcsh, fish)
        and not proc.pname in (runc, containerd-shim, docker-init)
      output: >
        Shell spawned in container (demo rule)
        (user=%user.name shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline
         container=%container.id image=%container.image.repository
         k8s_pod=%k8s.pod.name k8s_ns=%k8s.ns.name)
      priority: WARNING
      tags: [container, shell, mitre_execution, demo]

    - rule: Write Below Etc in Container (Demo)
      desc: >
        A process inside a container wrote to a path under /etc/. Writes to /etc/
        by container workloads are almost never legitimate and indicate a persistence
        attempt (cron injection, PAM modification, sudoers change, etc.).
      condition: >
        open_write and container and fd.name startswith /etc/
        and not fd.name in (/etc/mtab, /etc/hosts, /etc/hostname, /etc/resolv.conf)
      output: >
        Write below /etc in container (demo rule)
        (user=%user.name command=%proc.cmdline pid=%proc.pid
         file=%fd.name container=%container.id image=%container.image.repository
         k8s_pod=%k8s.pod.name k8s_ns=%k8s.ns.name)
      priority: ERROR
      tags: [container, filesystem, etc, mitre_persistence, demo]
